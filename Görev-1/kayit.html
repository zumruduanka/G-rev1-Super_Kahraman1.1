<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@500&family=Bebas+Neue&family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <title>Document</title>
    <style>
    #page {
        background-color: rgb(51, 49, 49);
        
    }

    h2 {
        font-family: arial;
        color:red;
        text-align:center;
    }
    form {
        text-decoration: none;
        color:rgb(255, 0, 0);
        font-family: 'Courier New', Courier, monospace;
        font-size: 20px;
    }
    button {
        font-family: antonio;
        font-size: 18px;
        background-color: black;
        color:red;
        border:1px solid red;
        margin: 20px;
        padding: 5px;
        width: 100px;
        display: block;
        margin-left: auto;
    }

    button:hover {
        background-color: red;
        color:black;
        cursor:pointer;
    }

    img {
        width: 600px;
        height: 380px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

        

    </style>
</head>
<body id="page">
    <form action="kayit.py" method="post">
        <h2>Kahraman Ekibine Katil</h2>
        <label for="isim">İsminiz:</label>
        <input type="text" id="isim" placeholder="İsminizi giriniz" required>
        <br>
        <br>
        <label for="soyisim">Soyisminiz:</label>
        <input type="text" id="soyisim" placeholder="Soyisminizi giriniz" required>
        <br>
        <br>
        <label for="kAdi">Süper Kahraman Adi:</label>
        <input type="text" id="kAdi" placeholder="Süper Kahraman Adinizi giriniz" required>
        <br>
        <br>
        <label for="guc">En Sevdiğiniz Süper Güç:</label>
        <input type="text" id="guc" placeholder="Hangi güç sensin?" required>
        <br>
        <br>
        <label for="mesaj">Başvuru Mesaji:</label>
        <textarea name="mesaj" placeholder="Neden kabul edilmelisin?"></textarea>
        <br>
        <br>
        <button type="submit">Gönder</button>
        <button type="reset">Temizle</button>
        <br>
        <br>
        <img src="Görev-images/flash-4.jpg" alt="Flash">



    </form>

    
</body>
</html>
